# CORS: patrones (coma-separados). Vercel, Railway front y localhost
FRONTEND_CORS_PATTERNS=${FRONTEND_CORS_PATTERNS:https://*.vercel.app,https://*.up.railway.app,http://localhost:*,http://127.0.0.1:*}
# Orígenes exactos extra (opcional, coma-separados)
FRONTEND_URL=${FRONTEND_URL:}

spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

spring.rabbitmq.host=${SPRING_RABBITMQ_HOST}
spring.rabbitmq.port=${SPRING_RABBITMQ_PORT:5671}
spring.rabbitmq.username=${SPRING_RABBITMQ_USERNAME}
spring.rabbitmq.password=${SPRING_RABBITMQ_PASSWORD}
spring.rabbitmq.virtual-host=${SPRING_RABBITMQ_VIRTUAL_HOST}
spring.rabbitmq.ssl.enabled=${SPRING_RABBITMQ_SSL_ENABLED:true}
server.port=${PORT:${SERVER_PORT:8082}}
